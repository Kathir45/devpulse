    <!-- Primary SEO Meta Tags -->
    <title>DevPulse — Developer Productivity Insights | Metrics, Interpretation & Action</title>
    <meta name="description" content="DevPulse helps developers move from raw metrics to better understanding and action. Track lead time, cycle time, deployment frequency, bug rate, and PR throughput with intelligent interpretation and next steps." />

    <meta property="og:type" content="website" />

    <meta property="og:description" content="Move from raw metrics to better understanding and action. Intelligent interpretation of developer productivity data with contextual next steps." />
